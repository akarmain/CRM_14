site_name: CRM_14 Documentation
site_description: Документация учебного MVP мини-CRM «CRM_14»
repo_name: akarmain/CRM_14
repo_url: https://gitverse.ru/akarmain/CRM_14

theme:
  name: material
  language: ru
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: indigo

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search

nav:
  - Главная: index.md
  - Введение:
      - README: 000_README.md
      - Карта документации: 000_Карта документации.md
  - Governance:
      - Project Charter: 00-governance/DOC-GOV-001-project-charter.md
      - Risk Register: 00-governance/DOC-GOV-002-risk-register-and-matrix.md
      - Roles & Communication: 00-governance/DOC-GOV-003-team-roles-and-communication-plan.md
      - Retrospective: 00-governance/DOC-GOV-004-team-retrospective-and-lessons-learned.md
  - Discovery:
      - Domain Research: 01-discovery/DOC-DIS-001-domain-research-crm-funnel.md
      - Users & Personas: 01-discovery/DOC-DIS-002-users-and-personas.md
  - Requirements:
      - User Stories & MoSCoW: 02-requirements/DOC-REQ-001-user-stories-and-moscow.md
      - Story Map: 02-requirements/DOC-REQ-002-user-story-map.md
  - Planning:
      - Technical Feasibility: 03-planning/DOC-PLN-001-technical-feasibility.md
      - WBS & Plan: 03-planning/DOC-PLN-002-wbs-and-work-plan.md
  - Architecture:
      - Process & User Flow: 04-architecture/DOC-ARC-001-business-process-and-user-flow.md
      - System Context: 04-architecture/DOC-ARC-002-system-context-and-solution-boundaries.md
      - UI Screens: 04-architecture/DOC-ARC-003-ui-screens-and-screen-logic.md
  - Data & Integration:
      - Logical Data Model: 05-data-and-integration/DOC-DAT-001-logical-data-model-and-erd.md
      - Data Dictionary: 05-data-and-integration/DOC-DAT-002-data-dictionary-and-validation-rules.md
      - API & Integration: 05-data-and-integration/DOC-INT-001-api-and-integration-contours.md
      - 1С + Python (Apache): 05-data-and-integration/DOC-INT-002-1c-python-apache-integration.md
      - 1С + Python (Docker): 05-data-and-integration/DOC-INT-003-1c-python-docker-integration.md
  - Final Specification:
      - Final Tech Spec: 06-final-specification/DOC-SPC-001-final-technical-specification.md
      - Module Map: 06-final-specification/DOC-SPC-002-solution-architecture-and-module-map.md
      - As-built реализация: 06-final-specification/DOC-SPC-003-as-built-implementation.md
  - Validation & Delivery:
      - Acceptance Tests: 07-validation-and-delivery/DOC-TST-001-acceptance-test-scenarios.md
      - Demo Scenario: 07-validation-and-delivery/DOC-OPS-001-demo-scenario-and-walkthrough.md
      - Deployment Runbook: 07-validation-and-delivery/DOC-OPS-002-deployment-plan-and-runbook.md
  - Checkpoints:
      - CP1: 90-checkpoints/CP1-deliverables.md
      - CP2: 90-checkpoints/CP2-deliverables.md
      - CP3: 90-checkpoints/CP3-deliverables.md
      - CP4: 90-checkpoints/CP4-deliverables.md
  - Standards:
      - Naming & Versioning: 99-standards/DOC-STD-001-document-naming-and-versioning.md
