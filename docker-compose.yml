services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/app.db
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: INFO
    volumes:
      - backend_data:/app/data
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
