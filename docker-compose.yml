services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mini_crm_simple}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mini_crm_simple}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      STORAGE_MODE: ${STORAGE_MODE:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/mini_crm_simple}
      ONEC_BASE_URL: ${ONEC_BASE_URL:-http://host.docker.internal:8314/Infobase/hs/http_methods}
      ONEC_TIMEOUT_SECONDS: ${ONEC_TIMEOUT_SECONDS:-10}
      ONEC_MAX_RETRIES: ${ONEC_MAX_RETRIES:-3}
      ONEC_RETRY_BACKOFF_SECONDS: ${ONEC_RETRY_BACKOFF_SECONDS:-0.35}
      UV_HTTP_TIMEOUT: ${UV_HTTP_TIMEOUT:-120}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SESSION_SECRET: ${SESSION_SECRET:-mini-crm-simple-dev-secret}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-false}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  pgdata:
